# =============================================================================
# APP-OF-APPS (Root Application)
# This is the root Application using the ArgoCD "App-of-Apps" pattern.
# It manages all child applications located in the argocd/applications/ folder.
# Apply this file once and ArgoCD will automatically deploy the entire platform.
#
# Flow: app-of-apps.yaml -> argocd/applications/*.yaml -> infrastructure + spark-apps
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-platform              # Display name shown in ArgoCD UI
  namespace: argocd                  # Application objects always live in the argocd namespace
  labels:
    app.kubernetes.io/part-of: spark-platform
  finalizers:
    # Finalizer ensures that when this app is deleted, ArgoCD deletes all child resources first.
    # Without a finalizer, K8s immediately removes the Application object
    # and child apps + K8s resources become orphaned (still running).
    - resources-finalizer.argocd.argoproj.io
spec:
  # Uses the "default" project because the root app only manages Application objects
  # inside the argocd namespace (no custom project needed for this)
  project: default
  source:
    repoURL: "https://github.com/thanhtt-demo/argocd-spark-operator.git"  # <-- REPLACE
    targetRevision: HEAD              # Always use the latest commit
    path: argocd/applications         # Folder containing child Application YAMLs
  destination:
    server: https://kubernetes.default.svc   # Deploy to the current cluster
    namespace: argocd                 # Child apps are created in the argocd namespace
  syncPolicy:
    automated:
      prune: true                     # Auto-delete resources removed from Git
      selfHeal: true                  # Auto-restore if someone manually edits the cluster
    syncOptions:
      - CreateNamespace=false         # Don't create the argocd namespace (already exists)
