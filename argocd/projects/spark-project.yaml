# =============================================================================
# ArgoCD AppProject - Spark Platform
# An AppProject defines the "permission scope" for all Applications in this project:
#   - Which source repos are allowed? (sourceRepos)
#   - Which namespaces can be deployed to? (destinations)
#   - Which resource types can be created? (clusterResourceWhitelist, namespaceResourceWhitelist)
# Acts as a security boundary - prevents apps from accidentally deploying to wrong namespaces
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: spark-platform
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Spark Platform - Operator and Applications

  # === SOURCE REPOS ===
  # List of Git/Helm repos that apps in this project are allowed to use
  sourceRepos:
    - "https://kubeflow.github.io/spark-operator"                       # Helm chart repo for Spark Operator
    - "https://github.com/thanhtt-demo/argocd-spark-operator.git"       # Git repo containing YAML manifests  # <-- REPLACE with your Git repo URL

  # === DESTINATIONS ===
  # Apps in this project can only deploy to these namespaces:
  destinations:
    - server: https://kubernetes.default.svc
      namespace: spark-operator       # Namespace for the Spark Operator controller
    - server: https://kubernetes.default.svc
      namespace: spark-apps           # Namespace for Spark applications
    - server: https://kubernetes.default.svc
      namespace: ""                   # Empty namespace = allows creating cluster-scoped resources (Namespace, CRDs)

  # === CLUSTER-SCOPED RESOURCES ===
  # Whitelist of cluster-scoped resource types (not bound to any namespace)
  # By default, ArgoCD does not allow creating cluster-scoped resources
  clusterResourceWhitelist:
    - group: ""                                    # Core API group
      kind: Namespace                              # Create namespaces (spark-operator, spark-apps)
    - group: "apiextensions.k8s.io"
      kind: CustomResourceDefinition               # CRDs: SparkApplication, ScheduledSparkApplication
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole                            # ClusterRole for Spark Operator
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding                     # ClusterRoleBinding for Spark Operator
    - group: "admissionregistration.k8s.io"
      kind: MutatingWebhookConfiguration           # Webhook: inject sidecar, modify pods
    - group: "admissionregistration.k8s.io"
      kind: ValidatingWebhookConfiguration         # Webhook: validate SparkApplication specs

  # === NAMESPACE-SCOPED RESOURCES ===
  # Whitelist of namespace-scoped resource types
  namespaceResourceWhitelist:
    - group: ""                       # Core: Pod, Service, ConfigMap, PVC, ServiceAccount...
      kind: "*"
    - group: "apps"                   # Deployment, StatefulSet, DaemonSet, ReplicaSet
      kind: "*"
    - group: "batch"                  # Job, CronJob
      kind: "*"
    - group: "rbac.authorization.k8s.io"  # Role, RoleBinding
      kind: "*"
    - group: "sparkoperator.k8s.io"   # SparkApplication, ScheduledSparkApplication
      kind: "*"

  # === ORPHANED RESOURCES ===
  # Warn if there are resources in a namespace not managed by any Application
  orphanedResources:
    warn: true
