# =============================================================================
# Child App: Spark Batch Applications (Sync Wave 4)
# Deploys Spark batch jobs: SparkPi, WordCount, Scheduled SparkPi
# Wave 4 = runs last, after namespace, operator, and RBAC are all ready
# Source: spark-apps/batch/ (3 files: spark-pi, word-count, spark-pi-scheduled)
#
# Batch jobs run once and terminate (unlike streaming which runs continuously)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-batch-apps
  namespace: argocd
  finalizers:
    # Ensures cascade delete removes SparkApplications before deleting the Application object
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: spark-platform
  annotations:
    # Sync Wave 4: runs last, alongside streaming
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: spark-platform
  source:
    repoURL: "https://github.com/thanhtt-demo/argocd-spark-operator.git"  # <-- REPLACE
    targetRevision: HEAD
    path: spark-apps/batch             # Folder containing 3 batch SparkApplication YAMLs
  destination:
    server: https://kubernetes.default.svc
    namespace: spark-apps              # Spark apps run in the spark-apps namespace
  syncPolicy:
    automated:
      prune: true                      # Delete SparkApplication if removed from Git
      selfHeal: true                   # Recreate if deleted/modified on the cluster
    syncOptions:
      - CreateNamespace=false          # Namespace was already created in wave 1
