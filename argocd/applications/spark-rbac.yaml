# =============================================================================
# Child App: Spark RBAC (Sync Wave 3)
# Creates ServiceAccount, Role, and RoleBinding for Spark applications.
# Runs after the Operator (wave 2) to ensure the spark-apps namespace is ready.
# Source: infrastructure/rbac/ (3 files: service-account, role, role-binding)
#
# Why is RBAC needed?
#   - Spark driver needs permission to create executor pods
#   - Driver needs permission to create services (for Spark UI)
#   - Driver needs to read/write ConfigMaps (for spark-submit metadata)
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-rbac
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: spark-platform
  annotations:
    # Sync Wave 3: runs after Operator (wave 2), before Spark apps (wave 4)
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: spark-platform
  source:
    repoURL: "https://github.com/thanhtt-demo/argocd-spark-operator.git"  # <-- REPLACE
    targetRevision: HEAD
    path: infrastructure/rbac          # Folder containing SA, Role, RoleBinding
  destination:
    server: https://kubernetes.default.svc
    namespace: spark-apps              # RBAC resources are created in the spark-apps namespace
  syncPolicy:
    automated:
      prune: true                      # Delete RBAC resources if removed from Git
      selfHeal: true                   # Recreate if deleted from the cluster
