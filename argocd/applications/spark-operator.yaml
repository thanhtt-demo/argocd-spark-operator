# =============================================================================
# Child App: Spark Operator (Sync Wave 2)
# Installs the Kubeflow Spark Operator via Helm chart.
# The Spark Operator is a K8s controller that watches SparkApplication CRDs
# and automatically creates corresponding driver/executor pods.
#
# Components installed:
#   - Controller: watches SparkApplication CRDs, creates spark-submit jobs
#   - Webhook: mutating/validating webhook to inject config into pods
#   - CRDs: SparkApplication, ScheduledSparkApplication
#   - RBAC: ClusterRole, ClusterRoleBinding for the operator
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: spark-platform
  annotations:
    # Sync Wave 2: runs after namespaces are created (wave 1)
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: spark-platform
  source:
    # Source is a Helm chart (not a Git repo)
    repoURL: https://kubeflow.github.io/spark-operator    # Helm chart repository
    chart: spark-operator                                  # Chart name
    targetRevision: "*"                                    # Latest stable version
    helm:
      releaseName: spark-operator
      valueFiles: []           # No external values file; inline values below
      values: |
        # --- Controller: manages SparkApplication lifecycle ---
        controller:
          replicas: 1          # 1 replica is sufficient for dev/staging
          resources:
            requests:
              cpu: 100m        # Minimum 0.1 CPU
              memory: 256Mi    # Minimum 256MB RAM
            limits:
              cpu: 500m        # Maximum 0.5 CPU
              memory: 512Mi    # Maximum 512MB RAM
        # --- Spark: configuration related to Spark jobs ---
        spark:
          jobNamespaces:
            - spark-apps       # Operator only watches SparkApplications in this namespace
        # --- Webhook: injects config into driver/executor pods ---
        webhook:
          enable: true         # Enable webhook (required for volume mounts, env vars injection)
          port: 9443           # Port 9443 to avoid conflict with the default port 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        # --- Metrics: expose Prometheus-compatible metrics ---
        metrics:
          enable: true         # Enable metrics endpoint
          port: 10254          # Port for metrics
          endpoint: /metrics   # Path for Prometheus to scrape
  destination:
    server: https://kubernetes.default.svc
    namespace: spark-operator               # Deploy into the spark-operator namespace
  syncPolicy:
    automated:
      prune: true                           # Remove resources no longer in the chart
      selfHeal: true                        # Auto-restore if drifted
    syncOptions:
      - CreateNamespace=true                # Create namespace if it doesn't exist (backup for wave 1)
      - ServerSideApply=true                # Server-side apply: avoids conflicts when Helm and ArgoCD co-manage
    retry:
      limit: 5                              # Retry up to 5 times if sync fails
      backoff:
        duration: 5s                        # Initial wait of 5 seconds
        factor: 2                           # Double the wait time on each retry (5s -> 10s -> 20s -> 40s -> 80s)
        maxDuration: 3m                     # Maximum wait of 3 minutes between retries
