apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spark-operator
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: spark-platform
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: spark-platform
  source:
    repoURL: https://kubeflow.github.io/spark-operator
    chart: spark-operator
    targetRevision: "*"  # Latest stable version
    helm:
      releaseName: spark-operator
      valueFiles: []
      values: |
        controller:
          replicas: 1
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
        spark:
          jobNamespaces:
            - spark-apps
        webhook:
          enable: true
          port: 8080
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
        metrics:
          enable: true
          port: 10254
          endpoint: /metrics
  destination:
    server: https://kubernetes.default.svc
    namespace: spark-operator
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
