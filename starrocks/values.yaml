# =============================================================================
# StarRocks Helm Chart Values (Umbrella Chart)
# Chart: kube-starrocks (https://starrocks.github.io/starrocks-kubernetes-operator)
#
# Values are nested under "kube-starrocks:" because this is an umbrella chart.
# kube-starrocks itself has two subcharts: operator and starrocks.
# So the full path is: kube-starrocks.operator.* and kube-starrocks.starrocks.*
#
# NOTE: For Minikube (cgroup v1), CPU limits must stay reasonable to avoid
# "invalid argument" errors on cpu.cfs_quota_us.
# =============================================================================
kube-starrocks:

  # === Operator ===
  operator:
    starrocksOperator:
      image:
        repository: starrocks/operator
        tag: v1.11.4
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 256Mi

  # === StarRocks Cluster ===
  starrocks:
    starrocksCluster:
      enabledBe: true
      enabledCn: false
      componentValues:
        image:
          tag: "4.1.0"

    # FE (Frontend): query parsing, metadata, planning
    starrocksFESpec:
      replicas: 2
      image:
        repository: starrocks/fe-ubuntu
        tag: "4.1.0"
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2
          memory: 4Gi

    # BE (Backend): data storage and query execution
    starrocksBESpec:
      replicas: 1
      image:
        repository: starrocks/be-ubuntu
        tag: "4.1.0"
      resources:
        requests:
          cpu: 2
          memory: 8Gi
        limits:
          cpu: 2
          memory: 4Gi
