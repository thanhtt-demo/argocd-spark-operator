# =============================================================================
# Spark Operator Helm Chart Values (Umbrella Chart)
# Chart: spark-operator (https://kubeflow.github.io/spark-operator)
#
# Values are nested under "spark-operator:" because this is an umbrella chart.
# Helm passes values under the dependency name to the subchart.
# Edit values here → push to Git → ArgoCD auto-syncs.
# =============================================================================
spark-operator:
  # Controller: watches SparkApplication CRDs and creates spark-submit jobs
  controller:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Spark job configuration
  spark:
    jobNamespaces:
      - spark-apps

  # Webhook: mutating/validating admission webhook for pod customization
  webhook:
    enable: true
    port: 9443           # Port 9443 to avoid conflict with default 8080
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Prometheus-compatible metrics endpoint
  metrics:
    enable: true
    port: 10254
    endpoint: /metrics
