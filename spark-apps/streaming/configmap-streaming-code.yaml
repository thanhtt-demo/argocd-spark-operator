# ConfigMap chứa source code PySpark cho streaming job
# ConfigMap được mount vào pod tại /opt/spark-apps/ (xem rate-structured-streaming.yaml)
# Cách này cho phép thay đổi code mà không cần build lại Docker image
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-streaming-app-code
  namespace: spark-apps
  labels:
    app.kubernetes.io/part-of: spark-platform
    app.kubernetes.io/component: streaming
data:
  # Key = filename khi mount vào pod → /opt/spark-apps/rate_streaming.py
  rate_streaming.py: |
    """
    Spark Structured Streaming - Rate Source Demo

    Flow:  Rate Source (10 rows/sec) → Windowed Aggregation (30s) → Console Output
           + Total event counter tích lũy từ lúc job bắt đầu

    Rate source là built-in source của Spark, tự generate data (timestamp, value)
    mà không cần Kafka hay external system. Rất phù hợp cho testing/demo.
    """
    from pyspark.sql import SparkSession
    from pyspark.sql.functions import window, col, count, avg, sum as spark_sum, lit

    # Tạo SparkSession - entry point cho mọi Spark application
    spark = SparkSession.builder \
        .appName("RateStreamingDemo") \
        .getOrCreate()

    # === SOURCE ===
    # Rate source: tự động generate rows (timestamp, value) với tốc độ 10 rows/giây
    # Không cần Kafka, Kinesis hay bất kỳ external system nào
    df = spark.readStream \
        .format("rate") \
        .option("rowsPerSecond", 10) \
        .load()

    # === QUERY 1: Windowed Aggregation ===
    # Watermark: cho phép data đến trễ tối đa 1 phút trước khi bị bỏ qua
    # Window: nhóm events theo cửa sổ 30 giây, tính count và average
    windowed = df \
        .withWatermark("timestamp", "1 minute") \
        .groupBy(window(col("timestamp"), "30 seconds")) \
        .agg(
            count("*").alias("event_count"),
            avg("value").alias("avg_value")
        )

    query_windowed = windowed.writeStream \
        .queryName("windowed_aggregation") \
        .outputMode("update") \
        .format("console") \
        .option("truncate", "false") \
        .trigger(processingTime="30 seconds") \
        .start()

    # === QUERY 2: Total Event Counter ===
    # Đếm tổng số event đã xử lý từ lúc job bắt đầu chạy
    # outputMode="complete": mỗi micro-batch ghi lại toàn bộ kết quả (1 row duy nhất)
    total_count = df \
        .agg(
            count("*").alias("total_events"),
            avg("value").alias("overall_avg_value")
        )

    query_total = total_count.writeStream \
        .queryName("total_event_counter") \
        .outputMode("complete") \
        .format("console") \
        .option("truncate", "false") \
        .trigger(processingTime="30 seconds") \
        .start()

    # Chờ cả 2 query - streaming job chạy liên tục cho đến khi bị stop
    spark.streams.awaitAnyTermination()
