# =============================================================================
# ConfigMap containing the PySpark source code for the streaming job.
# This ConfigMap is mounted into the pod at /opt/spark-apps/ (see rate-structured-streaming.yaml).
# This approach allows changing the code without rebuilding the Docker image.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-streaming-app-code
  namespace: spark-apps
  labels:
    app.kubernetes.io/part-of: spark-platform
    app.kubernetes.io/component: streaming
data:
  # Key = filename when mounted in the pod -> /opt/spark-apps/rate_streaming.py
  rate_streaming.py: |
    """
    Spark Structured Streaming - Rate Source Demo

    Flow:  Rate Source (10 rows/sec) -> Windowed Aggregation (30s) -> Console Output
           + Total event counter accumulated since the job started

    Rate source is a built-in Spark source that auto-generates data (timestamp, value)
    without requiring Kafka or any external system. Ideal for testing/demo.
    """
    from pyspark.sql import SparkSession
    from pyspark.sql.functions import window, col, count, avg, sum as spark_sum, lit

    # Create SparkSession - entry point for every Spark application
    spark = SparkSession.builder \
        .appName("RateStreamingDemo") \
        .getOrCreate()

    # === SOURCE ===
    # Rate source: auto-generates rows (timestamp, value) at 10 rows/second
    # No Kafka, Kinesis, or any external system needed
    df = spark.readStream \
        .format("rate") \
        .option("rowsPerSecond", 10) \
        .load()

    # === QUERY 1: Windowed Aggregation ===
    # Watermark: allows data to arrive up to 1 minute late before being discarded
    # Window: groups events into 30-second windows, computes count and average
    windowed = df \
        .withWatermark("timestamp", "1 minute") \
        .groupBy(window(col("timestamp"), "30 seconds")) \
        .agg(
            count("*").alias("event_count"),
            avg("value").alias("avg_value")
        )

    query_windowed = windowed.writeStream \
        .queryName("windowed_aggregation") \
        .outputMode("update") \
        .format("console") \
        .option("truncate", "false") \
        .trigger(processingTime="30 seconds") \
        .start()

    # === QUERY 2: Total Event Counter ===
    # Counts total events processed since the job started
    # outputMode="complete": each micro-batch outputs the full result (1 single row)
    total_count = df \
        .agg(
            count("*").alias("total_events"),
            avg("value").alias("overall_avg_value")
        )

    query_total = total_count.writeStream \
        .queryName("total_event_counter") \
        .outputMode("complete") \
        .format("console") \
        .option("truncate", "false") \
        .trigger(processingTime="30 seconds") \
        .start()

    # Wait for both queries - streaming job runs continuously until stopped
    spark.streams.awaitAnyTermination()
