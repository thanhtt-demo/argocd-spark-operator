apiVersion: sparkoperator.k8s.io/v1beta2
kind: ScheduledSparkApplication
metadata:
  name: spark-pi-scheduled
  namespace: spark-apps
  labels:
    app.kubernetes.io/part-of: spark-platform
    app.kubernetes.io/component: batch-scheduled
spec:
  schedule: "0 */6 * * *"  # Every 6 hours
  concurrencyPolicy: Forbid
  successfulRunHistoryLimit: 3
  failedRunHistoryLimit: 3
  template:
    type: Scala
    mode: cluster
    image: docker.io/library/spark:4.0.1
    imagePullPolicy: IfNotPresent
    mainClass: org.apache.spark.examples.SparkPi
    mainApplicationFile: local:///opt/spark/examples/jars/spark-examples.jar
    arguments:
      - "5000"
    sparkVersion: "4.0.1"
    restartPolicy:
      type: OnFailure
      onFailureRetries: 2
      onFailureRetryInterval: 10
      onSubmissionFailureRetries: 3
      onSubmissionFailureRetryInterval: 20
    driver:
      cores: 1
      coreLimit: "1200m"
      memory: "512m"
      labels:
        app: spark-pi-scheduled
        version: "4.0.1"
      serviceAccount: spark-operator-spark
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 185
        runAsGroup: 185
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
    executor:
      cores: 1
      instances: 1
      memory: "512m"
      labels:
        app: spark-pi-scheduled
        version: "4.0.1"
      securityContext:
        capabilities:
          drop:
            - ALL
        runAsUser: 185
        runAsGroup: 185
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        seccompProfile:
          type: RuntimeDefault
