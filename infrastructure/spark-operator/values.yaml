# =============================================================================
# Spark Operator Helm Chart Values - Reference Configuration
# Chart: spark-operator/spark-operator
# Repo: https://kubeflow.github.io/spark-operator
#
# NOTE: This file is a reference only. The actual values used during deployment
# are defined inline in argocd/applications/spark-operator.yaml (helm.values).
# Keep this file in sync manually if you make changes.
# =============================================================================

# Controller: watches SparkApplication CRDs and creates spark-submit jobs
controller:
  replicas: 1                         # 1 replica sufficient for dev/staging
  resources:
    requests:
      cpu: 100m                       # Minimum 0.1 CPU
      memory: 256Mi                   # Minimum 256MB RAM
    limits:
      cpu: 500m                       # Maximum 0.5 CPU
      memory: 512Mi                   # Maximum 512MB RAM

# Spark job configuration
spark:
  # Namespaces where the operator watches for SparkApplications
  jobNamespaces:
    - spark-apps                      # Operator only watches this namespace

# Webhook: mutating/validating admission webhook for pod customization
# Required for features like volume mounts, env vars injection, tolerations
webhook:
  enable: true                        # Enable webhook (required for volume mounts)
  port: 9443                          # Custom port to avoid conflict with default 8080
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Prometheus-compatible metrics endpoint
metrics:
  enable: true                        # Enable metrics for monitoring
  port: 10254                         # Port for Prometheus to scrape
  endpoint: /metrics                  # HTTP path for metrics
