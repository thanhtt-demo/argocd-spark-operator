apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-app-role-binding
  namespace: spark-apps
  labels:
    app.kubernetes.io/part-of: spark-platform
    app.kubernetes.io/component: spark-apps
subjects:
  - kind: ServiceAccount
    name: spark-app
    namespace: spark-apps
roleRef:
  kind: Role
  name: spark-app-role
  apiGroup: rbac.authorization.k8s.io
