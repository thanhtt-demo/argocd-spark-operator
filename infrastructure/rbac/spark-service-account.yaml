# =============================================================================
# ServiceAccount for Spark applications
# Used by Spark driver pods to interact with the Kubernetes API.
# The driver needs this SA to create/manage executor pods, services, and ConfigMaps.
# Referenced in SparkApplication specs as: serviceAccount: spark-app
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-app
  namespace: spark-apps               # Created in the spark-apps namespace
  labels:
    app.kubernetes.io/part-of: spark-platform
    app.kubernetes.io/component: spark-apps
