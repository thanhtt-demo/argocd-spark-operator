# =============================================================================
# Helm Template: ArgoCD Applications
# Loops over .Values.applications and generates one Application CRD per entry.
# All apps use Git source with path — including umbrella Helm charts
# (dagster/, spark-operator/) which have their own Chart.yaml + values.yaml.
# =============================================================================
{{- $config := .Values.config -}}
{{- range .Values.applications }}
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: {{ .name }}
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  labels:
    app.kubernetes.io/part-of: spark-platform
  annotations:
    argocd.argoproj.io/sync-wave: {{ .syncWave | default "0" | quote }}
spec:
  project: spark-platform
  source:
    repoURL: {{ $config.source.repoURL | quote }}
    targetRevision: {{ $config.source.targetRevision }}
    path: {{ .path | default .name }}
  destination:
    server: {{ $config.destination.server }}
    {{- if .namespace }}
    namespace: {{ .namespace }}
    {{- end }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    {{- if .syncOptions }}
    syncOptions:
    {{- range .syncOptions }}
      - {{ . }}
    {{- end }}
    {{- end }}
    {{- if .retry }}
    retry:
      limit: {{ .retry.limit }}
      backoff:
        duration: {{ .retry.backoff.duration }}
        factor: {{ .retry.backoff.factor }}
        maxDuration: {{ .retry.backoff.maxDuration }}
    {{- end }}
{{- end }}
