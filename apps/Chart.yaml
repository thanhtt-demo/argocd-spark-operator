# =============================================================================
# Helm Chart: Spark Platform Applications (App-of-Apps)
# This chart generates ArgoCD Application CRDs from values.yaml.
# Pattern: https://github.com/argoproj/argocd-example-apps/tree/master/apps
#
# ArgoCD reads this chart and renders it into:
#   - 1 AppProject (spark-platform)
#   - N Application objects (one per entry in values.applications)
# =============================================================================
apiVersion: v2
name: spark-platform
description: ArgoCD App-of-Apps for Spark Operator and Applications
type: application
version: 0.1.0
appVersion: "1.0"
