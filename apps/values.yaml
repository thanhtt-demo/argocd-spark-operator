# =============================================================================
# Spark Platform - Application Definitions
# This file defines all ArgoCD Applications deployed by the App-of-Apps pattern.
# The Helm template (templates/applications.yaml) loops over the "applications"
# list and generates one Application CRD per entry.
#
# To add a new component:
#   1. Create a folder at the repo root with the K8s manifests
#   2. Add an entry to the "applications" list below
#   3. Push to Git → ArgoCD auto-syncs the new Application
# =============================================================================

# === GLOBAL CONFIG ===
# Shared settings used by all Git-sourced applications
config:
  destination:
    server: https://kubernetes.default.svc       # Deploy to the local cluster
  source:
    repoURL: https://github.com/thanhtt-demo/argocd-spark-operator.git  # <-- REPLACE with your repo
    targetRevision: HEAD                          # Track the latest commit on main

# === APPLICATIONS ===
# Each entry generates one ArgoCD Application CRD.
# Sync waves control deployment ordering: wave 1 → 2 → 3 → 4
applications:

  # ---------- Wave 1: Namespaces ----------
  # Creates spark-operator and spark-apps namespaces.
  # Must run first because all subsequent apps require these namespaces.
  - name: spark-namespaces
    path: namespaces
    syncWave: "1"

  # # ---------- Wave 2: Spark Operator (Umbrella Helm Chart) ----------
  # # Installs the Kubeflow Spark Operator.
  # # Chart + values in spark-operator/ folder.
  # - name: spark-operator
  #   path: spark-operator
  #   namespace: spark-operator
  #   syncWave: "2"
  #   syncOptions:
  #     - CreateNamespace=true
  #     - ServerSideApply=true
  #   retry:
  #     limit: 5
  #     backoff:
  #       duration: 5s
  #       factor: 2
  #       maxDuration: 3m

  # # ---------- Wave 3: RBAC ----------
  # # ServiceAccount, Role, RoleBinding for Spark driver pods.
  # # Driver needs permissions to create executor pods, services, configmaps.
  # - name: spark-rbac
  #   path: rbac
  #   namespace: spark-apps
  #   syncWave: "3"

  # # ---------- Wave 4: Batch Spark Applications ----------
  # # SparkPi, WordCount, ScheduledSparkPi
  # - name: spark-batch-apps
  #   path: spark-batch
  #   namespace: spark-apps
  #   syncWave: "4"

  # # ---------- Wave 4: Streaming Spark Applications ----------
  # # Rate Structured Streaming (runs continuously)
  # - name: spark-streaming-apps
  #   path: spark-streaming
  #   namespace: spark-apps
  #   syncWave: "4"

  # ---------- Wave 2: StarRocks (Umbrella Helm Chart) ----------
  # StarRocks OLAP database: Operator + FE + BE.
  # Chart + values in starrocks/ folder.
  # - name: starrocks
  #   path: starrocks
  #   namespace: starrocks
  #   syncWave: "2"
  #   syncOptions:
  #     - CreateNamespace=true
  #     - ServerSideApply=true
  #   retry:
  #     limit: 5
  #     backoff:
  #       duration: 5s
  #       factor: 2
  #       maxDuration: 3m

  # ---------- Wave 2: Dagster (Umbrella Helm Chart) ----------
  # Dagster orchestration platform: webserver, daemon, user-code, PostgreSQL.
  # Chart + values in dagster/ folder.
  # - name: dagster
  #   path: dagster
  #   namespace: dagster
  #   syncWave: "2"
  #   syncOptions:
  #     - CreateNamespace=true
  #   retry:
  #     limit: 5
  #     backoff:
  #       duration: 5s
  #       factor: 2
  #       maxDuration: 3m

  # ---------- Wave 2: Keycloak (Umbrella Helm Chart) ----------
  # Keycloak identity and access management platform.
  # Chart + values in keycloak/ folder.
  # - name: keycloak
  #   path: keycloak
  #   namespace: keycloak
  #   syncWave: "2"
  #   syncOptions:
  #     - CreateNamespace=true
  #   retry:
  #     limit: 5
  #     backoff:
  #       duration: 5s
  #       factor: 2
  #       maxDuration: 3m

  # ---------- Wave 3: OAuth2 Proxy (Umbrella Helm Chart) ----------
  # Reverse proxy that authenticates Dagster UI access via Keycloak OIDC.
  # Users must be listed in oauth2-proxy/configmap-allowed-emails.yaml.
  # Chart + values in oauth2-proxy/ folder.
  # - name: oauth2-proxy
  #   path: oauth2-proxy
  #   namespace: dagster
  #   syncWave: "3"
  #   syncOptions:
  #     - CreateNamespace=true
  #   retry:
  #     limit: 5
  #     backoff:
  #       duration: 5s
  #       factor: 2
  #       maxDuration: 3m
