# =============================================================================
# Umbrella Chart: OAuth2 Proxy
# Wraps the official oauth2-proxy Helm chart as a dependency.
# ArgoCD points to this folder → Helm resolves the dependency automatically.
# Values in values.yaml are passed to the oauth2-proxy subchart.
# =============================================================================
apiVersion: v2
name: oauth2-proxy-umbrella
description: Umbrella chart for OAuth2 Proxy - authenticates Dagster UI via Keycloak OIDC
type: application
version: 0.1.0

dependencies:
  - name: oauth2-proxy
    version: "7.12.6"
    repository: https://oauth2-proxy.github.io/manifests
