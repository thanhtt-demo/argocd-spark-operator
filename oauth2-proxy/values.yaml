# =============================================================================
# OAuth2 Proxy Helm Chart Values (Umbrella Chart)
# Chart: oauth2-proxy (https://oauth2-proxy.github.io/manifests)
#
# Authenticates Dagster UI access via Keycloak OIDC.
# Unauthenticated users are redirected to Keycloak login.
# Only users listed in the email whitelist ConfigMap are allowed.
#
# Values are nested under "oauth2-proxy:" because this is an umbrella chart.
# =============================================================================
oauth2-proxy:

  config:
    # Use existing Kubernetes Secret for client-id, client-secret, cookie-secret
    existingSecret: oauth2-proxy-secret

    # OAuth2 Proxy configuration file
    configFile: |-
      # --- Provider: OIDC (Keycloak) ---
      # Using "oidc" provider instead of "keycloak-oidc" because keycloak-oidc
      # overrides login_url from OIDC discovery, ignoring our custom login_url.
      # With "oidc" provider we can set login_url to localhost for browser redirect
      # while keeping backend URLs pointing to cluster-internal Keycloak.
      provider = "oidc"
      provider_display_name = "Keycloak"

      # oidc_issuer_url: used by oauth2-proxy pod (inside cluster) for token validation
      oidc_issuer_url = "http://keycloak.keycloak.svc.cluster.local:8080/realms/dagster"

      # Disable OIDC auto-discovery so it does NOT override our custom login_url
      skip_oidc_discovery = true
      # Skip issuer verification: token iss="http://localhost:9090/..." (browser)
      # differs from oidc_issuer_url (cluster-internal). This is expected in port-forward setup.
      insecure_oidc_skip_issuer_verification = true

      # login_url: where BROWSER redirects to (must be localhost since we use port-forward)
      login_url = "http://localhost:9090/realms/dagster/protocol/openid-connect/auth"
      # redeem_url, oidc_jwks_url, profile_url: used by oauth2-proxy pod (cluster-internal)
      redeem_url = "http://keycloak.keycloak.svc.cluster.local:8080/realms/dagster/protocol/openid-connect/token"
      oidc_jwks_url = "http://keycloak.keycloak.svc.cluster.local:8080/realms/dagster/protocol/openid-connect/certs"
      profile_url = "http://keycloak.keycloak.svc.cluster.local:8080/realms/dagster/protocol/openid-connect/userinfo"
      # Skip fetching claims from userinfo endpoint — email is already in the ID token,
      # and the userinfo call fails with 401 because the access token issuer (localhost)
      # doesn't match the cluster-internal URL.
      skip_claims_from_profile_url = true

      redirect_url = "http://localhost:4180/oauth2/callback"
      code_challenge_method = "S256"
      oidc_email_claim = "email"
      insecure_oidc_allow_unverified_email = true

      # --- Upstream: Dagster Webserver ---
      upstreams = ["http://dagster-dagster-webserver.dagster.svc.cluster.local:80"]

      # --- Authorization: Email whitelist ---
      authenticated_emails_file = "/etc/oauth2-proxy/allowed-emails.txt"

      # --- Cookie settings (HTTP for local dev) ---
      cookie_secure = false
      cookie_name = "_oauth2_proxy"

      # --- Network ---
      http_address = "0.0.0.0:4180"

      # --- Misc ---
      # Do NOT set email_domains = ["*"] — it bypasses the email whitelist (OR logic).
      # Only authenticated_emails_file controls access.
      pass_authorization_header = true
      set_authorization_header = true
      set_xauthrequest = true
      skip_provider_button = true

  # Service configuration
  service:
    type: ClusterIP
    portNumber: 4180

  # Mount the email whitelist ConfigMap
  extraVolumes:
    - name: allowed-emails
      configMap:
        name: oauth2-proxy-allowed-emails

  extraVolumeMounts:
    - name: allowed-emails
      mountPath: /etc/oauth2-proxy
      readOnly: true

  # Resource limits
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
