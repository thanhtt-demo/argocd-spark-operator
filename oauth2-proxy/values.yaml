# =============================================================================
# OAuth2 Proxy Helm Chart Values (Umbrella Chart)
# Chart: oauth2-proxy (https://oauth2-proxy.github.io/manifests)
#
# Authenticates Dagster UI access via Keycloak OIDC.
# Unauthenticated users are redirected to Keycloak login.
# Only users listed in the email whitelist ConfigMap are allowed.
#
# Values are nested under "oauth2-proxy:" because this is an umbrella chart.
# =============================================================================
oauth2-proxy:

  config:
    # Use existing Kubernetes Secret for client-id, client-secret, cookie-secret
    existingSecret: oauth2-proxy-secret

    # OAuth2 Proxy configuration file
    configFile: |-
      # --- Provider: Keycloak OIDC ---
      provider = "keycloak-oidc"
      provider_display_name = "Keycloak"
      oidc_issuer_url = "http://keycloak.keycloak.svc.cluster.local:8080/realms/dagster"
      redirect_url = "http://localhost:4180/oauth2/callback"
      code_challenge_method = "S256"

      # --- Upstream: Dagster Webserver ---
      upstreams = ["http://dagster-dagster-webserver.dagster.svc.cluster.local:80"]

      # --- Authorization: Email whitelist ---
      authenticated_emails_file = "/etc/oauth2-proxy/allowed-emails.txt"

      # --- Cookie settings (HTTP for local dev) ---
      cookie_secure = false
      cookie_name = "_oauth2_proxy"

      # --- Network ---
      http_address = "0.0.0.0:4180"

      # --- Misc ---
      email_domains = ["*"]
      pass_authorization_header = true
      set_authorization_header = true
      set_xauthrequest = true
      skip_provider_button = true

  # Service configuration
  service:
    type: ClusterIP
    portNumber: 4180

  # Mount the email whitelist ConfigMap
  extraVolumes:
    - name: allowed-emails
      configMap:
        name: oauth2-proxy-allowed-emails

  extraVolumeMounts:
    - name: allowed-emails
      mountPath: /etc/oauth2-proxy
      readOnly: true

  # Resource limits
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi
