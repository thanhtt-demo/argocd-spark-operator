# =============================================================================
# EXAMPLE: OAuth2 Proxy Secret (DO NOT apply directly - replace placeholders!)
#
# This file is for DOCUMENTATION ONLY. Create the real secret via kubectl:
#
#   # 1. Generate a cookie secret:
#   python -c "import os,base64; print(base64.urlsafe_b64encode(os.urandom(32)).decode())"
#
#   # 2. Create the secret (replace <VALUES>):
#   kubectl create secret generic oauth2-proxy-secret \
#     --namespace dagster \
#     --from-literal=client-id=dagster-oauth2-proxy \
#     --from-literal=client-secret=<YOUR_KEYCLOAK_CLIENT_SECRET> \
#     --from-literal=cookie-secret=<GENERATED_COOKIE_SECRET>
#
# NEVER commit real secrets to Git!
# For production, use Sealed Secrets or External Secrets Operator.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-secret
  namespace: dagster
type: Opaque
stringData:
  client-id: "dagster-oauth2-proxy"
  client-secret: "<YOUR_KEYCLOAK_CLIENT_SECRET>"
  cookie-secret: "<GENERATED_COOKIE_SECRET>"
