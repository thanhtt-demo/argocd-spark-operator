# =============================================================================
# Umbrella Chart: Keycloak
# Wraps the CloudPirates Keycloak Helm chart as a dependency.
# ArgoCD points to this folder → Helm resolves the dependency automatically.
# Values in values.yaml are passed to the keycloak subchart.
# =============================================================================
apiVersion: v2
name: keycloak-umbrella
description: Umbrella chart for Keycloak identity and access management
type: application
version: 0.2.0

dependencies:
  - name: keycloak
    version: "0.19.8"
    repository: oci://registry-1.docker.io/cloudpirates
