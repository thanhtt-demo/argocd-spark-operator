# =============================================================================
# Keycloak Helm Chart Values (Umbrella Chart)
# Chart: keycloak (oci://registry-1.docker.io/cloudpirates/keycloak)
#
# Values are nested under "keycloak:" because this is an umbrella chart.
# Helm passes values under the dependency name to the subchart.
# Edit values here → push to Git → ArgoCD auto-syncs.
# =============================================================================
keycloak:
  # Override the fullname to avoid double-prefix (keycloak-keycloak-*)
  fullnameOverride: keycloak

  # Admin credentials (change in production!)
  keycloak:
    adminUser: admin
    adminPassword: admin
    production: false    # start-dev mode for local development
    httpEnabled: true

  # Service configuration
  service:
    type: ClusterIP
    httpPort: 8080

  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Embedded PostgreSQL database for Keycloak data
  postgres:
    enabled: true
    auth:
      database: keycloak
      password: keycloak
