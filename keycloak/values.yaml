# =============================================================================
# Keycloak Helm Chart Values (Umbrella Chart)
# Chart: keycloak (https://charts.bitnami.com/bitnami)
#
# Values are nested under "keycloak:" because this is an umbrella chart.
# Helm passes values under the dependency name to the subchart.
# Edit values here → push to Git → ArgoCD auto-syncs.
# =============================================================================
keycloak:
  # Override the fullname to avoid double-prefix (keycloak-keycloak-*)
  # Without this, umbrella chart names resources as <release>-<subchart>-*
  fullnameOverride: keycloak

  # Pin image to an available version
  image:
    tag: 25.0.6-debian-12-r2

  # Authentication: default admin credentials (change in production!)
  auth:
    adminUser: admin
    adminPassword: admin

  # Proxy configuration for running behind a reverse proxy / ingress
  proxy: edge

  # Production mode: set to true for production deployments
  production: false

  # Service configuration
  service:
    type: ClusterIP
    ports:
      http: 80
      https: 443

  # Resource limits
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # PostgreSQL: embedded database for Keycloak data
  postgresql:
    enabled: true
    image:
      tag: 16.6.0-debian-12-r6
    auth:
      postgresPassword: keycloak
      username: keycloak
      password: keycloak
      database: keycloak
    primary:
      persistence:
        enabled: true
        size: 1Gi
